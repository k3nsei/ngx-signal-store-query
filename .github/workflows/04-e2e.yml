name: E2E

concurrency:
  group: ${{ github.workflow }}-e2e-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        browser: ['chromium', 'firefox', 'webkit']
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Run tests
        env:
          HOME: /root
        working-directory: apps/demo-e2e
        run: pnpm playwright test --project=${{ matrix.browser }}

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-${{ matrix.browser }}-report
          path: |
            apps/demo-e2e/playwright-report/
            apps/demo-e2e/test-results/
          retention-days: 7
